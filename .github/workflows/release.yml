name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: agent-linux-amd64

          - goos: linux
            goarch: 386
            name: agent-linux-386

          - goos: linux
            goarch: arm64
            name: agent-linux-arm64

          - goos: linux
            goarch: arm
            goarm: "5"
            name: agent-linux-armv5

          - goos: linux
            goarch: arm
            goarm: "6"
            name: agent-linux-armv6

          - goos: linux
            goarch: arm
            goarm: "7"
            name: agent-linux-armv7

          - goos: linux
            goarch: mips
            gomips: softfloat
            name: agent-linux-mips

          - goos: linux
            goarch: mipsle
            gomips: softfloat
            name: agent-linux-mipsle

          - goos: linux
            goarch: mips64le
            gomips: softfloat
            name: agent-linux-mips64le

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -trimpath \
            -o dist/${{ matrix.name }} \
            ./cmd/agent

      - name: Package
        run: |
          cd dist
          tar -czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}
          rm ${{ matrix.name }}

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: binary-${{ matrix.name }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum agent-* > checksums.txt

      - uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}