name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64

          - goos: linux
            goarch: 386

          - goos: linux
            goarch: arm64

          # ARMv5 — старые роутеры (Marvell Kirkwood и т.п.)
          - goos: linux
            goarch: arm
            goarm: "5"

          # ARMv6 — Raspberry Pi 1, некоторые OpenWrt-устройства
          - goos: linux
            goarch: arm
            goarm: "6"

          # ARMv7 — большинство современных ARM-роутеров
          - goos: linux
            goarch: arm
            goarm: "7"

          # MIPS big-endian — Atheros, Broadcom (OpenWrt/DD-WRT)
          - goos: linux
            goarch: mips
            gomips: softfloat

          # MIPS little-endian — MediaTek (OpenWrt)
          - goos: linux
            goarch: mipsle
            gomips: softfloat

          # MIPS64 little-endian — более мощные MIPS-роутеры
          - goos: linux
            goarch: mips64le
            gomips: softfloat

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: "0"
        run: |
          SUFFIX=""
          [ -n "${{ matrix.goarm }}" ] && SUFFIX="v${{ matrix.goarm }}"

          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -trimpath \
            -o dist/agent-${{ matrix.goos }}-${{ matrix.goarch }}${SUFFIX} \
            ./cmd/agent

      - name: Package
        run: |
          cd dist
          NAME="agent-${{ matrix.goos }}-${{ matrix.goarch }}$( [ -n "${{ matrix.goarm }}" ] && echo "v${{ matrix.goarm }}" )"
          tar -czf ${NAME}.tar.gz ${NAME}
          rm ${NAME}

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum agent-* > checksums.txt

      - uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}